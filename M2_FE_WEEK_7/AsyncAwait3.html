<!doctype html>
<html>
  <body>
    <input id="userInput" placeholder="User to research" />
    <button id="sendButton">Get!</button>
    <div>
      <p>User Data:</p>
      <p id="userData"></p>
    </div>
    <div>
      <script>
        const userID = document.getElementById("userInput");
        const button = document.getElementById("sendButton");
        const userData = document.getElementById("userData");

        async function getUser(userID) {
          try {
            const response = await fetch(
              `https://reqres.in/api/users/${userID}`,
              {
                headers: {
                  "x-api-key": "reqres_5364c011770343ae8b39ba3e7bcc051a",
                },
              },
            );
            const data = await response.json();
            const status = await response.status;
            if (response.ok) {
              userData.innerHTML = "";
              for (const keys in data["data"]) {
                const item = document.createElement("p");
                item.innerHTML = `${keys} : ${data["data"][keys]}`;
                userData.appendChild(item);
              }
            } else {
              throw "Error 404";
            }
          } catch (error) {
            userData.innerHTML = "";
            const item = document.createElement("p");
            item.innerHTML = `An error occurred: ${error}`;
            userData.appendChild(item);
          }
        }
        button.addEventListener("click", () => getUser(userID.value));
      </script>
    </div>
  </body>
</html>
